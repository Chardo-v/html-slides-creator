<div class="layout-image-right">
  <div class="text-col">
    <div class="tag">图片支持</div>
    <h2>图文混排布局</h2>
    <p>在任意幻灯片中嵌入本地或远程图片，系统自动适配比例与裁剪模式。</p>
    <ul class="item-list" style="margin-top:1.4rem">
      <li>支持 JPG / PNG / WebP / SVG / GIF</li>
      <li><code style="font-size:0.85em;background:rgba(0,0,0,0.08);padding:2px 6px;border-radius:4px">.layout-image-left</code> 可将图片切换至左侧</li>
      <li>object-fit 控制填充（cover）或完整显示（contain）</li>
      <li>可用 &lt;video&gt; 标签直接嵌入视频素材</li>
    </ul>
  </div>
  <div class="img-col">
    <div class="img-frame">
      <!-- 将 src 替换为实际图片路径即可 -->
      <svg width="100%" height="100%" viewBox="0 0 420 315" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="imgSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#b0c8f8" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#f0d8c8" stop-opacity="0.45"/>
          </linearGradient>
          <linearGradient id="imgHill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c05530" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#c05530" stop-opacity="0.10"/>
          </linearGradient>
          <radialGradient id="imgSun" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#fce08a" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fce08a" stop-opacity="0"/>
          </radialGradient>
          <filter id="imgBlur"><feGaussianBlur stdDeviation="6"/></filter>
        </defs>
        <!-- 天空背景 -->
        <rect width="420" height="315" fill="url(#imgSky)"/>
        <!-- 太阳光晕 -->
        <circle cx="340" cy="72" r="52" fill="url(#imgSun)" filter="url(#imgBlur)"/>
        <circle cx="340" cy="72" r="26" fill="#fce08a" opacity="0.6"/>
        <!-- 远山 -->
        <ellipse cx="210" cy="280" rx="260" ry="95" fill="url(#imgHill)"/>
        <ellipse cx="90"  cy="290" rx="190" ry="70" fill="#c05530" opacity="0.18"/>
        <!-- 树 1 -->
        <polygon points="68,215 88,152 108,215" fill="#c05530" opacity="0.52"/>
        <polygon points="98,222 122,155 146,222" fill="#c05530" opacity="0.40"/>
        <!-- 树 2 -->
        <polygon points="310,220 328,164 346,220" fill="#c05530" opacity="0.38"/>
        <!-- 云 -->
        <ellipse cx="140" cy="68" rx="48" ry="18" fill="white" opacity="0.40"/>
        <ellipse cx="165" cy="60" rx="32" ry="14" fill="white" opacity="0.35"/>
        <ellipse cx="220" cy="52" rx="55" ry="16" fill="white" opacity="0.28"/>
        <!-- 相机框线 -->
        <rect x="168" y="118" width="84" height="62" rx="6"
              fill="none" stroke="white" stroke-width="2" opacity="0.65"/>
        <circle cx="210" cy="144" r="14"
                fill="none" stroke="white" stroke-width="2" opacity="0.65"/>
        <circle cx="210" cy="144" r="5" fill="white" opacity="0.50"/>
        <!-- 取景线 -->
        <polyline points="168,165 192,148 218,158 248,140 252,158"
                  fill="none" stroke="white" stroke-width="1.5" opacity="0.40"/>
        <!-- 提示文字 -->
        <text x="210" y="298" text-anchor="middle" font-size="13"
              fill="white" opacity="0.65"
              font-family="'PingFang SC','Segoe UI',system-ui,sans-serif">
          替换为 &lt;img src="..."&gt; 即可
        </text>
      </svg>
    </div>
  </div>
</div>
