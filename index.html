<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="utils/theme.css">
  <link rel="stylesheet" href="utils/transitions.css">
  <link rel="stylesheet" href="utils/editor.css">
</head>
<body data-transition="slide">

  <!-- 流动背景 -->
  <div id="bg">
    <div class="blob" id="b1"></div>
    <div class="blob" id="b2"></div>
    <div class="blob" id="b3"></div>
    <div class="blob" id="b4"></div>
  </div>

  <!-- Stage：按比例缩放的舞台容器 -->
  <div id="stage">
    <div id="deck"></div>
  </div>

  <footer id="bar">
    <span id="counter">— / —</span>
    <div id="track"><div id="fill"></div></div>
    <span id="hint">空格 / → 下一页 &nbsp;← 上一页</span>
    <button id="btn-export-pdf" type="button" title="导出当前演示为 PDF">导出 PDF</button>
  </footer>

  <!-- 编辑面板 -->
  <aside id="panel">
    <div class="pnl-head">
      <span>✎ 编辑模式</span>
      <button id="btn-present">▶ 演示</button>
    </div>
    <div class="pnl-body">

      <div class="pnl-section">
        <div class="pnl-label">主题</div>
        <div id="theme-swatches" class="theme-swatches"></div>
      </div>

      <div class="pnl-section">
        <div class="pnl-label">过渡动画</div>
        <div id="trans-options"></div>
      </div>

      <div class="pnl-section">
        <div class="pnl-label">页面比例</div>
        <div id="ratio-btns" class="ratio-btns">
          <button class="ratio-btn" data-ratio="16:9">16:9</button>
          <button class="ratio-btn" data-ratio="4:3">4:3</button>
          <button class="ratio-btn" data-ratio="1:1">1:1</button>
          <button class="ratio-btn" data-ratio="21:9">21:9</button>
        </div>
      </div>

      <div class="pnl-section">
        <div class="pnl-label">留白</div>
        <div class="pad-sliders">
          <div class="pad-row">
            <span class="pad-name">左右</span>
            <input type="range" id="slider-h-pad" min="0" max="0.3" step="0.01">
            <span id="label-h-pad" class="pad-val"></span>
          </div>
          <div class="pad-row">
            <span class="pad-name">上下</span>
            <input type="range" id="slider-v-pad" min="0" max="0.3" step="0.01">
            <span id="label-v-pad" class="pad-val"></span>
          </div>
        </div>
      </div>

      <div class="pnl-section">
        <div class="pnl-label">页面</div>
        <div id="slide-nav"></div>
      </div>

      <div class="pnl-section pnl-history">
        <div class="pnl-label">历史记录</div>
        <div id="history-list"></div>
      </div>

    </div>

  <div class="pnl-footer">
    <button id="btn-export-pdf-panel" class="pnl-btn-ghost">⇩ 导出 PDF</button>
    <button id="btn-save"  class="pnl-btn-primary">💾 保存所有编辑</button>
    <button id="btn-reset" class="pnl-btn-ghost">↺ 重置当前页</button>
  </div>

  </aside>

  <button id="btn-edit" title="打开编辑器">✎</button>
  <div id="toast"></div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="utils/charts.js"></script>
  <script src="utils/plotly-charts.js"></script>
  <script src="example-slides/slides.js"></script>
  <script src="utils/themes.js"></script>
  <script>
    const deck    = document.getElementById('deck');
    const fill    = document.getElementById('fill');
    const counter = document.getElementById('counter');
    const btnExportPdf = document.getElementById('btn-export-pdf');
    const btnExportPdfPanel = document.getElementById('btn-export-pdf-panel');
    let cur = 0;

    // 从配置读取标题
    document.title = GLOBAL_CONFIG.title || 'html-slides-creator';

    // 从配置 & localStorage 应用页面比例 + 留白
    (function applyRatio() {
      const saved = localStorage.getItem('pres-aspect-ratio');
      const ratio = saved || GLOBAL_CONFIG.aspectRatio || '16:9';
      const [rw, rh] = ratio.split(':');
      document.documentElement.style.setProperty('--aspect-ratio', `${rw}/${rh}`);
      // 留白：以相对比例存储，转换为 deck 坐标系下的 px
      const BASE_W = 1600;
      const deckH  = BASE_W * parseFloat(rh) / parseFloat(rw);
      const defHRatio = GLOBAL_CONFIG.hPad / BASE_W;
      const defVRatio = GLOBAL_CONFIG.vPad / deckH;
      const hRatio = parseFloat(localStorage.getItem('pres-h-pad-ratio') ?? defHRatio);
      const vRatio = parseFloat(localStorage.getItem('pres-v-pad-ratio') ?? defVRatio);
      document.documentElement.style.setProperty('--h-pad', (hRatio * BASE_W) + 'px');
      document.documentElement.style.setProperty('--v-pad', (vRatio * deckH)  + 'px');
    })();

    async function init() {
      for (const path of SLIDES) {
        const div = document.createElement('div');
        div.className = 'slide future';
        try {
          div.innerHTML = await fetch(path).then(r => r.text());
        } catch (err) {
          console.error(`加载幻灯片失败: ${path}`, err);
          div.innerHTML = `<div class="slide-center"><p style="color:var(--muted)">⚠ 加载失败: ${path}</p></div>`;
        }
        deck.appendChild(div);
      }
      go(0);
      window.dispatchEvent(new Event('pres-ready'));
    }

    function go(index) {
      deck.querySelectorAll('.slide').forEach((s, i) => {
        s.className = 'slide ' + (i < index ? 'past' : i === index ? 'active' : 'future');
      });
      cur = index;
      counter.textContent = `${cur + 1} / ${SLIDES.length}`;
      fill.style.width = `${(cur + 1) / SLIDES.length * 100}%`;
      if (window.onSlideChange) window.onSlideChange(index);
      window.dispatchEvent(new CustomEvent('slide-change', { detail: { index } }));
    }

    const next = () => cur < SLIDES.length - 1 && go(cur + 1);
    const prev = () => cur > 0 && go(cur - 1);

    // ── 统一打印入口 ──────────────────────────────────────────
    // 用于 afterprint 还原的快照列表
    let _printSnapshots = [];

    async function doPrint() {
      syncPrintSlideBackgrounds();

      // 在打印 CSS 生效之前，用 Plotly.toImage() 将每个图表转为静态 SVG 图片。
      // 原因：打印模式下 clientWidth/offsetWidth 仍返回屏幕尺寸，
      //       Plotly.Plots.resize() 异步完成时打印渲染已结束，无法正确缩放。
      _printSnapshots = [];
      if (typeof Plotly !== 'undefined') {
        for (const el of document.querySelectorAll('[data-plotly-done]')) {
          const r  = el.getBoundingClientRect();
          const w  = Math.max(Math.round(r.width),  100);
          const h  = Math.max(Math.round(r.height), 100);
          let img = null;
          try {
            const url = await Plotly.toImage(el, { format: 'png', width: w, height: h });
            img = document.createElement('img');
            // 继承容器的 inline 样式（flex:1; min-width:0 等），再补全高度填充
            img.style.cssText = el.style.cssText + ';min-height:0;width:100%;height:100%;display:block;';
            img.src = url;
            // 等待图片解码完成，确保打印时图片已可见（防止最后一张图来不及渲染）
            try { await img.decode(); } catch (_) {}
            el.after(img);
          } catch (e) {
            console.warn('[print] Plotly.toImage failed', e);
          }
          // 无论成功与否都隐藏原始 Plotly 元素，避免其在打印模式下渲染异常
          el.style.display = 'none';
          _printSnapshots.push({ el, img });
        }
      }

      // 注入精确的 @page 尺寸（必须在 window.print() 之前生效）
      const ratio = getComputedStyle(document.documentElement)
        .getPropertyValue('--aspect-ratio').trim() || '16/9';
      const [rw, rh] = ratio.split('/').map(Number);
      const pageW = 297; // mm（A4 横向宽度）
      const pageH = +(pageW * rh / rw).toFixed(2);
      let ps = document.getElementById('_print_page');
      if (!ps) { ps = document.createElement('style'); ps.id = '_print_page'; document.head.appendChild(ps); }
      ps.textContent = `@page { size: ${pageW}mm ${pageH}mm; margin: 0; }`;
      window.print();
    }

    function syncPrintSlideBackgrounds() {
      const deckRect = deck.getBoundingClientRect();
      if (!deckRect.width || !deckRect.height) return;

      const blobs = [...document.querySelectorAll('#bg .blob')];
      deck.querySelectorAll('.slide').forEach(slide => {
        slide.querySelector('.print-bg')?.remove();

        const layer = document.createElement('div');
        layer.className = 'print-bg';
        layer.setAttribute('aria-hidden', 'true');

        blobs.forEach(blob => {
          const rect = blob.getBoundingClientRect();
          const cs = getComputedStyle(blob);
          const clone = document.createElement('div');
          clone.className = 'print-blob';
          clone.style.left = `${(rect.left - deckRect.left) / deckRect.width * 100}%`;
          clone.style.top = `${(rect.top - deckRect.top) / deckRect.height * 100}%`;
          clone.style.width = `${rect.width / deckRect.width * 100}%`;
          clone.style.height = `${rect.height / deckRect.height * 100}%`;
          clone.style.opacity = cs.opacity;
          clone.style.filter = cs.filter;
          clone.style.backgroundImage = cs.backgroundImage;
          clone.style.backgroundRepeat = 'no-repeat';
          clone.style.backgroundPosition = 'center';
          clone.style.backgroundSize = 'cover';
          clone.style.borderRadius = cs.borderRadius;
          layer.appendChild(clone);
        });

        slide.prepend(layer);
      });
    }

    // ── beforeprint：同步背景、px 变量 → vw/vh（所见即所得），resize Plotly ──
    window.addEventListener('beforeprint', () => {
      syncPrintSlideBackgrounds();
      document.documentElement.dataset.printing = '1';

      const cs = getComputedStyle(document.documentElement);
      const ratio = (cs.getPropertyValue('--aspect-ratio').trim() || '16/9');
      const [rw, rh] = ratio.split('/').map(Number);
      const BASE_W  = 1600;
      const BASE_H  = BASE_W * rh / rw;

      // 读取当前 px 值（由 JS applyPadding 设置的 inline style）
      const hPx = parseFloat(cs.getPropertyValue('--h-pad')) || 100;
      const vPx = parseFloat(cs.getPropertyValue('--v-pad')) || 64;
      const hPct = (hPx / BASE_W * 100).toFixed(4);
      const vPct = (vPx / BASE_H * 100).toFixed(4);

      // 保存原始 px 值，afterprint 还原
      document.documentElement.dataset.printHpad = hPx;
      document.documentElement.dataset.printVpad = vPx;

      // 转为 vw/vh：使布局与屏幕等比
      document.documentElement.style.setProperty('--h-pad', `calc(${hPct}vw)`);
      document.documentElement.style.setProperty('--v-pad', `calc(${vPct}vh)`);

    });

    // ── afterprint：还原 px 变量、Plotly 快照、恢复当前页图表 ──
    window.addEventListener('afterprint', () => {
      const ps = document.getElementById('_print_page');
      if (ps) ps.remove();
      delete document.documentElement.dataset.printing;

      const hPx = parseFloat(document.documentElement.dataset.printHpad) || 100;
      const vPx = parseFloat(document.documentElement.dataset.printVpad) || 64;
      document.documentElement.style.setProperty('--h-pad', hPx + 'px');
      document.documentElement.style.setProperty('--v-pad', vPx + 'px');

      // 还原被替换的 Plotly 元素
      for (const { el, img } of _printSnapshots) {
        el.style.display = '';
        img?.remove();
      }
      _printSnapshots = [];

      if (typeof Plotly !== 'undefined') {
        const active = document.querySelector('.slide.active');
        if (active) active.querySelectorAll('[data-plotly-done]').forEach(el => {
          try { Plotly.Plots.resize(el); } catch (_) {}
        });
      }
    });

    document.addEventListener('keydown', e => {
      if (e.target.isContentEditable) return;
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') return; // 让 editor.js 处理
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); doPrint(); return; }
      if ([' ', 'ArrowRight', 'ArrowDown'].includes(e.key)) { e.preventDefault(); next(); }
      if (['ArrowLeft', 'ArrowUp'].includes(e.key))         { e.preventDefault(); prev(); }
    });

    btnExportPdf?.addEventListener('click', doPrint);
    btnExportPdfPanel?.addEventListener('click', doPrint);

    deck.addEventListener('click', () => {
      if (!document.body.classList.contains('edit-mode')) next();
    });

    init();
  </script>
  <script src="utils/editor.js"></script>
</body>
</html>
